name: Android

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup-and-build:
    name: Build APKs (debug / pre-release / release)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Install Android command-line tools and NDK
        run: |
          set -e
          mkdir -p $HOME/Android/Sdk/cmdline-tools
          TMP_ZIP=/tmp/cmdline-tools.zip
          curl -sSL https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -o "$TMP_ZIP"
          unzip -q "$TMP_ZIP" -d "$HOME/Android/Sdk/cmdline-tools"
          if [ -d "$HOME/Android/Sdk/cmdline-tools/cmdline-tools" ]; then
            mv "$HOME/Android/Sdk/cmdline-tools/cmdline-tools" "$HOME/Android/Sdk/cmdline-tools/latest"
          else
            mv "$HOME/Android/Sdk/cmdline-tools" "$HOME/Android/Sdk/cmdline-tools/latest" || true
          fi
          # Forzamos la misma ruta para ambas variables para que Gradle no detecte rutas distintas
          echo "ANDROID_HOME=$HOME/Android/Sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/Android/Sdk" >> $GITHUB_ENV
          echo "PATH=$HOME/Android/Sdk/cmdline-tools/latest/bin:$HOME/Android/Sdk/platform-tools:$PATH" >> $GITHUB_ENV
          yes | "$HOME/Android/Sdk/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$HOME/Android/Sdk" "platform-tools" "platforms;android-33" "build-tools;33.0.2" "ndk;22.1.7171670"
          yes | "$HOME/Android/Sdk/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$HOME/Android/Sdk" --licenses

      - name: Assemble Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Try assemble pre-release (both common names)
        run: |
          set -e
          if ./gradlew assemblePre_release --no-daemon --stacktrace; then
            echo "assembled assemblePre_release"
          elif ./gradlew assemblePreRelease --no-daemon --stacktrace; then
            echo "assembled assemblePreRelease"
          else
            echo "Pre-release assemble task not found or failed" >&2
            exit 1
          fi

      - name: Assemble Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace || echo "assembleRelease failed (signing/config may be missing)"

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apk-artifacts
          path: |
            **/build/outputs/**/*.apk

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Run Tests
        run: |
          set -e
          if ./gradlew test --no-daemon --stacktrace; then
            echo "ran ./gradlew test"
          elif ./gradlew testDebugUnitTest --no-daemon --stacktrace; then
            echo "ran testDebugUnitTest"
          else
            echo "Unit tests failed or tasks not found"
          fi

      - name: Upload Test Results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            **/build/reports/
            **/build/test-results/
