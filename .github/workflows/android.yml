name: Android

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  setup-and-build:
    name: Build APKs (debug / pre-release / release)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Install Android command-line tools and NDK
        run: |
          set -e
          mkdir -p $HOME/Android/Sdk/cmdline-tools
          TMP_ZIP=/tmp/cmdline-tools.zip
          curl -sSL https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -o "$TMP_ZIP"
          unzip -q "$TMP_ZIP" -d "$HOME/Android/Sdk/cmdline-tools"
          if [ -d "$HOME/Android/Sdk/cmdline-tools/cmdline-tools" ]; then
            mv "$HOME/Android/Sdk/cmdline-tools/cmdline-tools" "$HOME/Android/Sdk/cmdline-tools/latest"
          else
            mv "$HOME/Android/Sdk/cmdline-tools" "$HOME/Android/Sdk/cmdline-tools/latest" || true
          fi
          # Unificar variables para que Gradle vea una sola ruta al SDK
          echo "ANDROID_HOME=$HOME/Android/Sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/Android/Sdk" >> $GITHUB_ENV
          echo "PATH=$HOME/Android/Sdk/cmdline-tools/latest/bin:$HOME/Android/Sdk/platform-tools:$PATH" >> $GITHUB_ENV
          # Instalar componentes necesarios (ajusta versiones si tu proyecto lo requiere)
          yes | "$HOME/Android/Sdk/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$HOME/Android/Sdk" "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;22.1.7171670"
          yes | "$HOME/Android/Sdk/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$HOME/Android/Sdk" --licenses

      - name: Print environment (debug)
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          java -version
          ./gradlew --version

      - name: Ensure build directory
        run: mkdir -p build

      - name: Assemble Debug (verbose) and capture log
        run: |
          set -o pipefail
          mkdir -p build
          ./gradlew assembleDebug --no-daemon --stacktrace --info --warning-mode all 2>&1 | tee build/gradle-assembleDebug.log

      - name: Try assemble pre-release (both naming conventions, verbose)
        run: |
          set -e
          set -o pipefail
          mkdir -p build
          if ./gradlew assemblePre_release --no-daemon --stacktrace --info --warning-mode all 2>&1 | tee build/gradle-assemblePreRelease.log; then
            echo "assembled assemblePre_release"
          elif ./gradlew assemblePreRelease --no-daemon --stacktrace --info --warning-mode all 2>&1 | tee build/gradle-assemblePreRelease.log; then
            echo "assembled assemblePreRelease"
          else
            echo "Pre-release assemble task not found or failed" >&2
            exit 1
          fi

      - name: Assemble Release (verbose, do not fail pipeline on signing errors)
        run: |
          set -o pipefail
          mkdir -p build
          ./gradlew assembleRelease --no-daemon --stacktrace --info --warning-mode all 2>&1 | tee build/gradle-assembleRelease.log || true

      - name: Upload Gradle logs and reports (always)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: gradle-logs-and-reports
          path: |
            build/gradle-*.log
            build/reports/**
            **/build/reports/problems/**
            **/build/outputs/**/*.apk

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Ensure build directory for tests
        run: mkdir -p build

      - name: Run Tests (verbose) and capture log
        run: |
          set -o pipefail
          mkdir -p build
          ./gradlew test --no-daemon --stacktrace --info --warning-mode all 2>&1 | tee build/gradle-test.log || (./gradlew testDebugUnitTest --no-daemon --stacktrace --info --warning-mode all 2>&1 | tee build/gradle-testDebugUnitTest.log) || true

      - name: Upload Test Reports (always)
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/gradle-*.log
            **/build/reports/
            **/build/test-results/
